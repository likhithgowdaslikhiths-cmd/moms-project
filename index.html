      Cormorant Garamond — Display / Headings
        Weights: 300 (light), 400 (regular), 500 (medium), 600 (semibold), 700 (bold)
        Styles:  Normal + Italic

      DM Sans — Body / UI
        Weights: 300 (light), 400 (regular), 500 (medium), 600 (semibold)

      Dancing Script — Accent / Taglines
        Weights: 400, 500, 600
    -->
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Dancing+Script:wght@400;500;600&display=swap"

    />

    <!-- ── CACHE CONTROL ──────────────────────────────────── -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
